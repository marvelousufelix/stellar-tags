name: CI Build

on:
  push:
    branches: [feat/autofocus-input]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd payment-dashboard
          npm ci

      - name: Build
        run: |
          cd payment-dashboard
          npm run build
