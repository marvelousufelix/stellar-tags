name: Emoji and Slop Checker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check-emojis:
    name: check-emojis (push)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Scan for Emojis and Slop
        run: |
          python3 -c '
          import os, re, sys

          # Regex for common emoji ranges
          emoji_pattern = re.compile("[\U00010000-\U0010ffff]", flags=re.UNICODE)
          
          # Define your "slop" words here
          slop_words = ["lorem ipsum", "test123", "asdf", "todo:", "fixme:"]
          
          found_issues = False

          # Walk through the directory, ignoring .git
          for root, dirs, files in os.walk("."):
              if ".git" in root: continue
              for file in files:
                  if file.endswith((".md", ".txt")):
                      path = os.path.join(root, file)
                      try:
                          with open(path, "r", encoding="utf-8") as f:
                              for i, line in enumerate(f):
                                  # Check for Emojis
                                  if emoji_pattern.search(line):
                                      print(f"❌ Emoji found in {path} at line {i+1}")
                                      found_issues = True
                                  # Check for Slop
                                  for word in slop_words:
                                      if word in line.lower():
                                          print(f"❌ Slop word \"{word}\" found in {path} at line {i+1}")
                                          found_issues = True
                      except Exception as e:
                          print(f"Could not read {path}: {e}")

          if found_issues:
              print("Workflow failed due to emojis or slop.")
              sys.exit(1)
          else:
              print("✅ Codebase is clean! No emojis or slop found.")
          '