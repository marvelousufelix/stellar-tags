name: CI / Docs Spellcheck

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  spellcheck:
    name: Docs Spellcheck (push)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run CSpell on Documentation
        uses: streetsidesoftware/cspell-action@v5
        with:
          # Only scan markdown files (you can add .txt or other extensions here)
          files: '**/*.md'
          # Force the workflow to fail if spelling errors are found
          strict: true
          # Show the surrounding text where the spelling error occurred
          inline: warning